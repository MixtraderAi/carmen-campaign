    <rect x="190" y="535" width="280" height="44" rx="18" fill="#22d3ee" fill-opacity="0.10" stroke="#22d3ee" stroke-width="2"/>
    
    <text x="330.0" y="565.0" font-size="20" fill="#d4d4d8" font-weight="650" text-anchor="middle" font-family="Inter, Arial">basic monitoring</text>
    <text x="870" y="245" font-size="34" fill="#c19a6b" font-weight="800" text-anchor="middle" font-family="Inter, Arial, sans-serif">Market Response</text>
    <rect x="730" y="295" width="280" height="44" rx="18" fill="#c19a6b" fill-opacity="0.10" stroke="#c19a6b" stroke-width="2"/>
    
    <text x="870.0" y="325.0" font-size="20" fill="#d4d4d8" font-weight="650" text-anchor="middle" font-family="Inter, Arial">leads</text>
    
    <rect x="730" y="355" width="280" height="44" rx="18" fill="#c19a6b" fill-opacity="0.10" stroke="#c19a6b" stroke-width="2"/>
    
    <text x="870.0" y="385.0" font-size="20" fill="#d4d4d8" font-weight="650" text-anchor="middle" font-family="Inter, Arial">views</text>
    
    <rect x="730" y="415" width="280" height="44" rx="18" fill="#c19a6b" fill-opacity="0.10" stroke="#c19a6b" stroke-width="2"/>
    
    <text x="870.0" y="445.0" font-size="20" fill="#d4d4d8" font-weight="650" text-anchor="middle" font-family="Inter, Arial">sale timing</text>
    
    <rect x="730" y="475" width="280" height="44" rx="18" fill="#c19a6b" fill-opacity="0.10" stroke="#c19a6b" stroke-width="2"/>
    
    <text x="870.0" y="505.0" font-size="20" fill="#d4d4d8" font-weight="650" text-anchor="middle" font-family="Inter, Arial">buyer decision</text>
    
    <rect x="730" y="535" width="280" height="44" rx="18" fill="#c19a6b" fill-opacity="0.10" stroke="#c19a6b" stroke-width="2"/>
    
    <text x="870.0" y="565.0" font-size="20" fill="#d4d4d8" font-weight="650" text-anchor="middle" font-family="Inter, Arial">market demand</text>
    <path d="M590,230 V650" stroke="#3f3f46" stroke-width="2" stroke-dasharray="10 10"/><text x="600" y="720" font-size="27" fill="#fff" font-weight="800" text-anchor="middle" font-family="Inter, Arial, sans-serif">Professional setup improves presentation — results are not guaranteed.</text>

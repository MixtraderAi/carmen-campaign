    <text x="560" y="492" font-size="28" fill="#c19a6b" font-weight="900" text-anchor="middle" font-family="Inter, Arial, sans-serif">+</text>
    <rect x="590" y="450" width="200" height="66" rx="18" fill="#c19a6b" fill-opacity="0.10" stroke="#c19a6b" stroke-width="2"/>
    
    <text x="690.0" y="491.0" font-size="20" fill="#d4d4d8" font-weight="650" text-anchor="middle" font-family="Inter, Arial">New cover idea</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="cyanGlow" cx="20%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coffeeGlow" cx="85%" cy="85%" r="70%">
      <stop offset="0%" stop-color="#c19a6b" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#c19a6b" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; }
      .ui { font-family: Inter, Arial, sans-serif; }
      .small { font-size: 18px; fill: #a1a1aa; font-family: Inter, Arial, sans-serif; }
      .label { font-size: 22px; fill: #d4d4d8; font-weight: 600; font-family: Inter, Arial, sans-serif; }
      .micro { font-size: 15px; fill: #a1a1aa; font-family: Inter, Arial, sans-serif; }
      .chip { font-size: 16px; font-weight: 700; letter-spacing: .08em; font-family: Inter, Arial, sans-serif; }
    </style>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#22d3ee" stroke-width="2"/>
    </marker>
    <marker id="arrowCoffee" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#c19a6b" stroke-width="2"/>
    </marker>
  </defs>
  <rect width="1200" height="800" rx="34" fill="#09090b"/>
  <rect width="1200" height="800" rx="34" fill="url(#cyanGlow)"/>
  <rect width="1200" height="800" rx="34" fill="url(#coffeeGlow)"/>
  <text x="70" y="72" font-size="38" fill="#ffffff" class="title">One Revision Round</text>
  <text x="70" y="106" font-size="22" fill="#a1a1aa" font-family="Inter, Arial, sans-serif">One complete feedback list, submitted once.</text>

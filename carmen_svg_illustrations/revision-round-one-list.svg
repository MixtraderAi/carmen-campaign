    <rect x="425" y="575" width="350" height="56" rx="18" fill="#f87171" fill-opacity="0.12" stroke="#f87171" stroke-width="2"/><text x="600" y="611" font-size="22" fill="#f87171" font-weight="800" text-anchor="middle" font-family="Inter, Arial, sans-serif">Multiple rounds = additional service</text><text x="600" y="725" font-size="28" fill="#fff" font-weight="800" text-anchor="middle" font-family="Inter, Arial, sans-serif">Feedback should be collected first, then sent once.</text>

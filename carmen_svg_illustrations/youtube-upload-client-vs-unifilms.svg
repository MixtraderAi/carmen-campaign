    <rect x="270" y="282" width="110" height="76" rx="16" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-width="3"/>
    <path d="M313,298 L353,320 L313,342 Z" fill="#22d3ee" fill-opacity="0.85"/>
    
    <rect x="180" y="405" width="290" height="72" rx="18" fill="#22d3ee" fill-opacity="0.10" stroke="#22d3ee" stroke-width="2"/>
    
    <text x="325.0" y="449.0" font-size="20" fill="#d4d4d8" font-weight="650" text-anchor="middle" font-family="Inter, Arial">Already in workflow</text>
    <path d="M325,485 L325,535" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowCyan)"/>
    <rect x="215" y="550" width="220" height="48" rx="24.0" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.45"/>
    <text x="325.0" y="580.0" class="chip" fill="#22d3ee" text-anchor="middle">AED 350 / VIDEO</text>
    <text x="325" y="630" font-size="18" fill="#a1a1aa" font-weight="400" text-anchor="middle" font-family="Inter, Arial, sans-serif">We know the style,</text>
<text x="325" y="658" font-size="18" fill="#a1a1aa" font-weight="400" text-anchor="middle" font-family="Inter, Arial, sans-serif">edit, context, and material.</text><text x="875" y="230" font-size="28" fill="#fff" font-weight="700" text-anchor="middle" font-family="Inter, Arial, sans-serif">Client-Provided Video</text>
    <rect x="750" y="282" width="110" height="76" rx="16" fill="#c19a6b" fill-opacity="0.12" stroke="#c19a6b" stroke-width="3"/>
    <path d="M793,298 L833,320 L793,342 Z" fill="#c19a6b" fill-opacity="0.85"/>
    <text x="950" y="328" font-size="56" fill="#c19a6b" font-weight="800" text-anchor="middle" font-family="Inter, Arial, sans-serif">?</text>
    <rect x="730" y="405" width="290" height="72" rx="18" fill="#c19a6b" fill-opacity="0.10" stroke="#c19a6b" stroke-width="2"/>
    
    <text x="875.0" y="449.0" font-size="20" fill="#d4d4d8" font-weight="650" text-anchor="middle" font-family="Inter, Arial">Check + adapt + package</text>
    <path d="M875,485 L875,535" stroke="#c19a6b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowCoffee)"/>
    <rect x="765" y="550" width="220" height="48" rx="24.0" fill="#c19a6b" fill-opacity="0.12" stroke="#c19a6b" stroke-opacity="0.45"/>
    <text x="875.0" y="580.0" class="chip" fill="#c19a6b" text-anchor="middle">AED 450 / VIDEO</text>
    <text x="875" y="630" font-size="18" fill="#a1a1aa" font-weight="400" text-anchor="middle" font-family="Inter, Arial, sans-serif">External file needs</text>
<text x="875" y="658" font-size="18" fill="#a1a1aa" font-weight="400" text-anchor="middle" font-family="Inter, Arial, sans-serif">more checking and adaptation.</text>
</svg>

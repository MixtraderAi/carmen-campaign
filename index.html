<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmen Moubarak | YouTube & Campaign Clarification</title>
    <meta name="description" content="Scope, Posting, Advertising & Briefing Workflow clarification for Carmen Moubarak by UniFilms.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    zinc: {
                        950: '#09090b',
                        900: '#18181b',
                        800: '#27272a',
                        700: '#3f3f46',
                        600: '#52525b',
                        500: '#71717a',
                        400: '#a1a1aa',
                        300: '#d4d4d8',
                    },
                    cyan: { 400: '#22d3ee' },
                    coffee: { DEFAULT: '#c19a6b', light: '#d4b896', dark: '#a07d56' },
                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                    serif: ['Playfair Display', 'serif'],
                },
            }
        }
    }
    </script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #09090b; color: #d4d4d8; margin: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }

        /* Glass cards */
        .card-glass {
            background: rgba(24,24,27,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(63,63,70,0.5);
            border-radius: 1.5rem;
            will-change: transform;
            transform: translateZ(0);
        }
        .sidebar-glass {
            background: rgba(24,24,27,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid rgba(63,63,70,0.4);
        }

        /* Reduce blur on mobile for performance */
        @media (max-width: 768px) {
            .card-glass {
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                background: rgba(24,24,27,0.92);
            }
            .sidebar-glass {
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                background: rgba(24,24,27,0.95);
            }
            .mobile-nav {
                backdrop-filter: blur(8px) !important;
                -webkit-backdrop-filter: blur(8px) !important;
            }
        }

        /* Glows */
        .bg-glow-cyan {
            background: radial-gradient(ellipse 600px 400px at 20% 50%, rgba(34,211,238,0.06) 0%, transparent 70%);
        }
        .bg-glow-coffee {
            background: radial-gradient(ellipse 600px 400px at 80% 50%, rgba(193,154,107,0.06) 0%, transparent 70%);
        }

        /* Active tab */
        .active-tab {
            background: rgba(34,211,238,0.1);
            border-color: rgba(34,211,238,0.3);
            color: #22d3ee;
        }

        /* Fade in */
        .fade-in {
            opacity: 0;
            transform: translate3d(0, 20px, 0);
            transition: opacity 0.5s ease, transform 0.5s ease;
            will-change: opacity, transform;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }
        @media (max-width: 768px) {
            .fade-in {
                transform: translate3d(0, 12px, 0);
                transition: opacity 0.35s ease, transform 0.35s ease;
            }
        }

        /* Smooth scroll */
        html { scroll-behavior: smooth; }

        /* Stop line */
        .stop-line {
            position: relative;
            padding: 0.75rem 1.5rem;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 0.75rem;
            color: #fca5a5;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
        }

        /* Workflow connector */
        .workflow-connector {
            width: 2px;
            height: 24px;
            background: linear-gradient(to bottom, #22d3ee, transparent);
            margin: 0 auto;
        }

        /* Mobile nav */
        @media (max-width: 1023px) {
            .desktop-sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { margin-left: 0; }
        }
        @media (min-width: 1024px) {
            .desktop-sidebar { display: flex; }
            .mobile-nav { display: none; }
            .main-content { margin-left: 260px; }
        }

        /* FAQ accordion */
        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
        }
        .faq-answer.open {
            max-height: 800px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── NAV DATA ─── */
    const sections = [
        { id: 'overview',   label: 'Overview',   short: 'Overview',  icon: 'layout-dashboard' },
        { id: 'youtube',    label: 'YouTube',    short: 'YouTube',   icon: 'play-circle' },
        { id: 'campaigns',  label: 'Campaign Options', short: 'Ads', icon: 'target' },
        { id: 'focus',      label: 'Campaign Focus',   short: 'Focus', icon: 'crosshair' },
        { id: 'monitoring', label: 'Monitoring', short: 'Monitor',   icon: 'bar-chart-3' },
        { id: 'meetings',   label: 'Meetings',  short: 'Meetings',  icon: 'clock' },
        { id: 'workflow',   label: 'Next Workflow', short: 'Workflow', icon: 'check-circle-2' },
        { id: 'faq',        label: 'FAQ',        short: 'FAQ',       icon: 'help-circle' },
        { id: 'pricing',    label: 'Pricing',    short: 'Pricing',   icon: 'wallet' },
    ];

    /* ─── REUSABLE COMPONENTS ─── */

    function HeaderBadge({ text, color = 'cyan' }) {
        const colors = {
            cyan: 'bg-cyan-400/10 border-cyan-400/20 text-cyan-400',
            coffee: 'bg-coffee/10 border-coffee/20 text-coffee',
        };
        return (
            <div className={`inline-flex items-center px-4 py-1.5 rounded-full border text-xs font-semibold uppercase tracking-widest ${colors[color]}`}>
                {text}
            </div>
        );
    }

    function SectionCard({ children, className = '', glow = '' }) {
        return (
            <div className={`card-glass p-6 md:p-8 fade-in ${glow} ${className}`}>
                {children}
            </div>
        );
    }

    function NoteCard({ children, type = 'info' }) {
        const styles = {
            info: 'border-cyan-400/30 bg-cyan-400/5',
            warning: 'border-coffee/30 bg-coffee/5',
            important: 'border-red-400/30 bg-red-400/5',
        };
        return (
            <div className={`rounded-xl border p-4 mt-4 ${styles[type]}`}>
                <div className="flex items-start gap-3">
                    <span className="text-sm leading-relaxed text-zinc-300">{children}</span>
                </div>
            </div>
        );
    }

    function IncludedList({ items }) {
        return (
            <ul className="space-y-2 mt-3">
                {items.map((item, i) => (
                    <li key={i} className="flex items-start gap-2 text-sm text-zinc-300">
                        <span className="text-cyan-400 mt-0.5 shrink-0">✓</span>
                        <span>{item}</span>
                    </li>
                ))}
            </ul>
        );
    }

    function NotIncludedList({ items }) {
        return (
            <ul className="space-y-2 mt-3">
                {items.map((item, i) => (
                    <li key={i} className="flex items-start gap-2 text-sm text-zinc-400">
                        <span className="text-red-400/70 mt-0.5 shrink-0">✕</span>
                        <span>{item}</span>
                    </li>
                ))}
            </ul>
        );
    }

    function PriceCard({ title, price, subtitle, included, note, accent = 'cyan' }) {
        const accentColor = accent === 'cyan' ? 'text-cyan-400' : 'text-coffee';
        const borderColor = accent === 'cyan' ? 'border-cyan-400/20 hover:border-cyan-400/40' : 'border-coffee/20 hover:border-coffee/40';
        return (
            <div className={`card-glass p-6 border ${borderColor} transition-colors`}>
                <div className="mb-1">
                    <span className="text-xs uppercase tracking-widest text-zinc-500">{subtitle}</span>
                </div>
                <h4 className="font-serif text-xl text-white mb-1">{title}</h4>
                <p className={`text-2xl font-bold ${accentColor} mb-4`}>{price}</p>
                {included && <IncludedList items={included} />}
                {note && <NoteCard type="info">{note}</NoteCard>}
            </div>
        );
    }

    function WorkflowStep({ number, title, text, active = true }) {
        return (
            <div className={`flex items-start gap-4 ${!active ? 'opacity-40' : ''}`}>
                <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 text-sm font-bold ${active ? 'bg-cyan-400/15 text-cyan-400 border border-cyan-400/30' : 'bg-zinc-800 text-zinc-500 border border-zinc-700'}`}>
                    {number}
                </div>
                <div>
                    <h4 className={`font-semibold ${active ? 'text-white' : 'text-zinc-500'}`}>{title}</h4>
                    <p className={`text-sm mt-1 ${active ? 'text-zinc-400' : 'text-zinc-600'}`}>{text}</p>
                </div>
            </div>
        );
    }

    function ExampleCard({ title, label, positive = true, boxes = 1 }) {
        const borderBg = positive ? 'border-cyan-400/25 bg-cyan-400/5' : 'border-coffee/25 bg-coffee/5';
        const boxBg = positive ? 'bg-cyan-400/15 border-cyan-400/40 text-cyan-400' : 'bg-coffee/15 border-coffee/40 text-coffee';
        const labelColor = positive ? 'text-cyan-400' : 'text-coffee';
        const statusIcon = positive ? '✓' : '✕';
        const statusBg = positive ? 'bg-cyan-400/20 text-cyan-400' : 'bg-red-400/20 text-red-400';
        return (
            <div className={`rounded-2xl border p-5 ${borderBg} transition-all hover:scale-[1.02]`}>
                {/* Status badge */}
                <div className="flex items-center justify-between mb-4">
                    <span className={`w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold ${statusBg}`}>{statusIcon}</span>
                    <span className={`text-xs font-bold uppercase tracking-widest ${labelColor}`}>{boxes === 1 ? '1 Focus' : `${boxes} Focuses`}</span>
                </div>
                {/* Box diagram */}
                <div className="flex items-center justify-center gap-2 mb-4 flex-wrap">
                    {Array.from({ length: boxes }).map((_, i) => (
                        <React.Fragment key={i}>
                            {i > 0 && <span className={`text-xl font-black ${labelColor} mx-1`}>+</span>}
                            <div className={`w-14 h-14 md:w-16 md:h-16 rounded-xl border-2 flex items-center justify-center text-lg font-black ${boxBg}`}>
                                <i data-lucide={positive ? 'package' : 'package'} className="w-6 h-6"></i>
                            </div>
                        </React.Fragment>
                    ))}
                </div>
                {/* Title */}
                <p className="text-sm text-white font-semibold text-center leading-snug">{title}</p>
                <p className={`text-[11px] mt-2 font-semibold uppercase tracking-wider text-center ${labelColor}`}>{label}</p>
            </div>
        );
    }

    function FAQItem({ question, answer, keyLine, example }) {
        const [open, setOpen] = useState(false);
        return (
            <div className="card-glass border border-zinc-800/50 overflow-hidden transition-colors hover:border-zinc-700/60">
                <button
                    onClick={() => setOpen(!open)}
                    className="w-full flex items-center justify-between p-5 text-left cursor-pointer"
                >
                    <span className="text-white font-medium pr-4">{question}</span>
                    <span className={`text-zinc-500 shrink-0 transition-transform ${open ? 'rotate-45' : ''}`} style={{ fontSize: '1.4rem', lineHeight: 1 }}>+</span>
                </button>
                <div className={`faq-answer ${open ? 'open' : ''}`} style={{ padding: open ? '0 1.25rem 1.25rem' : '0 1.25rem 0' }}>
                    <p className="text-sm text-zinc-400 leading-relaxed">{answer}</p>
                    {example && (
                        <div className="mt-3 p-3 rounded-lg bg-zinc-900/80 border border-zinc-800 text-sm text-zinc-400">
                            {example}
                        </div>
                    )}
                    {keyLine && (
                        <p className="mt-3 text-sm font-semibold text-cyan-400">{keyLine}</p>
                    )}
                </div>
            </div>
        );
    }

    /* ─── SIDEBAR ─── */
    function Sidebar({ active, onNav }) {
        return (
            <aside className="desktop-sidebar fixed left-0 top-0 bottom-0 w-[260px] sidebar-glass z-40 flex-col py-8 px-5 overflow-y-auto">
                <div className="mb-10">
                    <p className="text-xs uppercase tracking-widest text-coffee font-semibold mb-1">UniFilms</p>
                    <h1 className="font-serif text-lg text-white leading-snug">Carmen Moubarak</h1>
                    <p className="text-xs text-zinc-500 mt-1">YouTube & Campaign Clarification</p>
                </div>
                <nav className="space-y-1">
                    {sections.map(s => (
                        <button
                            key={s.id}
                            onClick={() => onNav(s.id)}
                            className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition-all cursor-pointer ${active === s.id ? 'active-tab' : 'text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/50'}`}
                        >
                            <i data-lucide={s.icon} className="w-4 h-4"></i>
                            <span>{s.label}</span>
                        </button>
                    ))}
                </nav>
                <div className="mt-auto pt-8">
                    <div className="text-xs text-zinc-600 border-t border-zinc-800 pt-4">
                        Scope • Posting • Advertising<br/>Briefing Workflow
                    </div>
                </div>
            </aside>
        );
    }

    /* ─── MOBILE NAV ─── */
    function MobileNav({ active, onNav }) {
        return (
            <nav className="mobile-nav fixed bottom-0 left-0 right-0 z-50 bg-zinc-950/90 backdrop-blur-lg border-t border-zinc-800 px-1 py-1 justify-around overflow-x-auto gap-0">
                {sections.map(s => (
                    <button
                        key={s.id}
                        onClick={() => onNav(s.id)}
                        className={`flex flex-col items-center justify-center px-2 py-2 min-w-[52px] rounded-lg text-[10px] transition-colors cursor-pointer ${active === s.id ? 'text-cyan-400' : 'text-zinc-500'}`}
                    >
                        <i data-lucide={s.icon} className="w-4 h-4 mb-0.5"></i>
                        <span>{s.short}</span>
                    </button>
                ))}
            </nav>
        );
    }

    /* ─── SECTION COMPONENTS ─── */

    function OverviewSection() {
        return (
            <section id="overview" className="space-y-8 bg-glow-cyan">
                <div className="fade-in">
                    <HeaderBadge text="Clarification Briefing" color="cyan" />
                    <h2 className="font-serif text-3xl md:text-4xl text-white mt-4 mb-3">Clear Working Structure</h2>
                    <p className="text-zinc-400 max-w-2xl leading-relaxed">
                        We want to clarify a few points properly, so we are fully aligned going forward and there is no confusion about YouTube, advertising support, and meetings.
                    </p>
                    <p className="text-zinc-400 max-w-2xl leading-relaxed mt-3">
                        This briefing separates YouTube posting, advertising setup, monthly campaign management, and meeting/briefing workflow so each part is clear and the collaboration stays simple, transparent, and efficient.
                    </p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                    {[
                        { title: 'YouTube Posting', text: 'Per-video upload and basic packaging only. Not full YouTube management.', icon: 'play-circle' },
                        { title: 'Advertising Support', text: 'One campaign setup or one active monthly campaign focus. Not all content at once.', icon: 'target' },
                        { title: 'Meetings', text: 'Briefings and reviews are possible. Live technical training is a separate workflow.', icon: 'users' },
                    ].map((c, i) => (
                        <SectionCard key={i}>
                            <div className="w-12 h-12 rounded-2xl bg-cyan-400/10 border border-cyan-400/20 flex items-center justify-center mb-4">
                                <i data-lucide={c.icon} className="w-6 h-6 text-cyan-400"></i>
                            </div>
                            <h3 className="text-white font-semibold text-lg mb-2">{c.title}</h3>
                            <p className="text-sm text-zinc-400 leading-relaxed">{c.text}</p>
                        </SectionCard>
                    ))}
                </div>
            </section>
        );
    }

    function YouTubeSection() {
        return (
            <section id="youtube" className="space-y-8 bg-glow-coffee">
                <div className="fade-in">
                    <HeaderBadge text="YouTube Services" color="coffee" />
                    <h2 className="font-serif text-3xl md:text-4xl text-white mt-4 mb-3">YouTube Setup & Uploads</h2>
                    <p className="text-zinc-400 max-w-2xl leading-relaxed mt-2">
                        First, regarding YouTube.
                    </p>
                </div>

                {/* Timeline */}
                <div className="space-y-4 fade-in">
                    <h3 className="text-white font-semibold uppercase tracking-wider text-sm mb-4">Timeline</h3>
                    <WorkflowStep number="1" title="Channel Setup — Completed" text="We agreed separately to open and set up your YouTube channel, including the basic channel setup and channel cover/branding, for AED 250. This part has been completed." />
                    <div className="workflow-connector"></div>
                    <WorkflowStep number="2" title="First Upload — One-Time Launch Support" text="After that, you asked us to also upload one of the existing videos to YouTube. This upload was not part of the original production package, and it was also not included in the AED 250 channel setup fee. However, we did it as a one-time launch support to help you get the channel started properly. For that video, we used the existing cover and adapted the available description, because the video was already suitable for YouTube." />
                    <div className="workflow-connector"></div>
                    <WorkflowStep number="3" title="Future Uploads — Per Video" text="Going forward, YouTube posting and packaging will be treated as a separate add-on service. Each video requires its own upload preparation, description, optimization, and cover — regardless of the video source." />
                    <NoteCard type="info">
                        <strong>What does 'per video' mean in practice?</strong> Each video you want uploaded to YouTube counts as one separate task. For example, if you have 3 videos to upload this month, that is 3 × AED 350 or 3 × AED 450. There is no monthly bundle or unlimited upload option.
                    </NoteCard>
                </div>

                {/* Pricing cards */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-5 fade-in">
                    <PriceCard
                        title="Client-Provided Video"
                        price="AED 450 / video"
                        subtitle="External content"
                        accent="coffee"
                        included={['Upload', 'Title', 'Basic description', 'Basic YouTube optimization', 'Hashtags / tags', 'Upload settings', 'Simple thumbnail / cover using available materials']}
                        note="This applies when the video is provided by you or comes from outside our current production workflow. Higher price because additional checking and adaptation is needed."
                    />
                    <PriceCard
                        title="UniFilms-Produced Video"
                        price="AED 350 / video"
                        subtitle="In-house content"
                        accent="cyan"
                        included={['Upload', 'Basic description', 'Basic YouTube optimization', 'Simple YouTube thumbnail / cover based on the existing visual direction', 'Basic channel organization if needed']}
                        note="This applies when the video was already filmed, edited, or prepared by UniFilms."
                    />
                </div>

                {/* 3-column comparison */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 fade-in">
                    <SectionCard>
                        <div className="text-center">
                            <div className="w-12 h-12 rounded-2xl bg-cyan-400/10 border border-cyan-400/20 flex items-center justify-center mx-auto mb-3">
                                <i data-lucide="monitor" className="w-5 h-5 text-cyan-400"></i>
                            </div>
                            <h4 className="text-white font-semibold mb-2">Channel Setup</h4>
                            <p className="text-xs text-zinc-400 mb-3">Create and prepare the YouTube channel.</p>
                            <span className="inline-block text-xs px-3 py-1 rounded-full bg-cyan-400/10 text-cyan-400 font-medium">Completed — AED 250</span>
                        </div>
                    </SectionCard>
                    <SectionCard>
                        <div className="text-center">
                            <div className="w-12 h-12 rounded-2xl bg-coffee/10 border border-coffee/20 flex items-center justify-center mx-auto mb-3">
                                <i data-lucide="upload" className="w-5 h-5 text-coffee"></i>
                            </div>
                            <h4 className="text-white font-semibold mb-2">Video Upload</h4>
                            <p className="text-xs text-zinc-400 mb-3">Upload one video and package it with title, description, optimization, and cover.</p>
                            <span className="inline-block text-xs px-3 py-1 rounded-full bg-coffee/10 text-coffee font-medium">AED 350 or AED 450 / video</span>
                        </div>
                    </SectionCard>
                    <SectionCard className="opacity-50">
                        <div className="text-center">
                            <div className="w-12 h-12 rounded-2xl bg-zinc-800 border border-zinc-700 flex items-center justify-center mx-auto mb-3">
                                <i data-lucide="bar-chart-3" className="w-5 h-5 text-zinc-500"></i>
                            </div>
                            <h4 className="text-zinc-500 font-semibold mb-2">YouTube Management</h4>
                            <p className="text-xs text-zinc-600 mb-3">Plan channel growth, analyze performance, manage posting strategy over time.</p>
                            <span className="inline-block text-xs px-3 py-1 rounded-full bg-zinc-800 text-zinc-500 font-medium">Not included</span>
                        </div>
                    </SectionCard>
                </div>

                <div className="fade-in rounded-2xl overflow-hidden border border-zinc-800/50">
                    <img src="carmen_svg_illustrations/youtube-setup-vs-upload-vs-management.svg" alt="YouTube setup vs upload vs management" className="w-full h-auto" loading="lazy" />
                </div>
                <div className="fade-in rounded-2xl overflow-hidden border border-zinc-800/50">
                    <img src="carmen_svg_illustrations/youtube-upload-client-vs-unifilms.svg" alt="Client video vs UniFilms video upload pricing" className="w-full h-auto" loading="lazy" />
                </div>

                <NoteCard type="warning">
                    <strong className="text-coffee">Important:</strong> This is not YouTube management or growth strategy. It is only upload and basic packaging per video. Both options are per video. Not per month. Not full channel management.
                </NoteCard>
            </section>
        );
    }

    function CampaignOptionsSection() {
        return (
            <section id="campaigns" className="space-y-8 bg-glow-cyan">
                <div className="fade-in">
                    <HeaderBadge text="Advertising" color="cyan" />
                    <h2 className="font-serif text-3xl md:text-4xl text-white mt-4 mb-3">Campaign Options</h2>
                    <p className="text-zinc-400 max-w-2xl leading-relaxed mt-2">
                        Second, regarding advertising and boosting. There are two different options depending on the level of support you need.
                    </p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
                    {/* One-Time */}
                    <div className="card-glass p-6 border border-zinc-800 hover:border-coffee/30 transition-colors">
                        <span className="text-xs uppercase tracking-widest text-coffee font-semibold">Launch Only</span>
                        <h3 className="font-serif text-2xl text-white mt-2">One-Time Campaign Setup</h3>
                        <p className="text-3xl font-bold text-coffee mt-2">AED 1,500 <span className="text-sm text-zinc-500 font-normal">+ ad spend</span></p>

    function App() {

            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }, []);

        // Intersection Observer for active section
        useEffect(() => {
            const observer = new IntersectionObserver(
                (entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setActiveSection(entry.target.id);
                        }
                    });
                },
                { rootMargin: '-20% 0px -70% 0px', threshold: 0 }
            );
            sections.forEach(s => {
                const el = document.getElementById(s.id);
                if (el) observer.observe(el);
            });
            return () => observer.disconnect();
        }, []);

        // Init Lucide icons — run once on mount + on section changes
        useEffect(() => {
            const timer = setTimeout(() => {
                if (window.lucide) lucide.createIcons();
            }, 150);
            return () => clearTimeout(timer);
        }, [activeSection]);

        // Fade-in observer — run once on mount
        useEffect(() => {
            const observer = new IntersectionObserver(
                (entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                },
                { threshold: 0.08, rootMargin: '0px 0px -50px 0px' }
            );
            // Delay to let React finish rendering
            const timer = setTimeout(() => {
                document.querySelectorAll('.fade-in:not(.visible)').forEach(el => observer.observe(el));
            }, 200);
            return () => { clearTimeout(timer); observer.disconnect(); };
        }, []);
